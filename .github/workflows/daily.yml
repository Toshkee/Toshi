name: Daily News Brief

on:
  schedule:
    # 08:00 UTC daily = 10:00 in Montenegro (CEST, summer) / 09:00 (CET, winter).
    # Cron is fixed UTC and does NOT follow DST, so in winter switch to "0 9 * * *"
    # for 10:00 local. GitHub schedules are best-effort and often run 10-60+ min late.
    - cron: "0 8 * * *"
  workflow_dispatch: {} # manual "Run workflow" button for test runs

# Avoid overlapping runs if a manual trigger lands during a scheduled one.
concurrency:
  group: daily-brief
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm start
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
